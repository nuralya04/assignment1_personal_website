<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loh Koh Wong</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:black;
    color:white;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:black;
    position:relative;
    z-index:1000;
}

header h1{
    color:orange;
    margin:0;
}

/* NAVIGATION */
nav{
    display:flex;
    gap:20px;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:bold;
    padding:10px 15px;
    border-radius:5px;
    transition:0.3s;
}

nav a:hover{
    background:orange;
    color:black;
}

/* GALLERY */
.gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:20px;
}

.gallery img{
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:10px;
}

/* ACTIVITIES */
.activities{
    text-align:center;
    padding:20px;
    font-size:18px;
    color:orange;
}
</style>

</head>

<body>

<header>
    <h1>LOH KOH WONG</h1>

    <nav>
        <a href="#home">HOME</a>
        <a href="#about">ABOUT ME</a>
        <a href="#careers">CAREERS</a>
        <a href="#gallery">GALLERY</a>
    </nav>
</header>

<section class="gallery" id="gallery">
    <img src="https://i.imgur.com/yKmKa2W.jpeg">
    <img src="https://i.imgur.com/J5h3Qeu.jpeg">
    <img src="https://i.imgur.com/q0DMnqs.jpeg">
    <img src="https://i.imgur.com/rulwgOw.jpeg">
</section>

<section class="activities">
    OOTD SPOT ~ FISH POND ~ SWIMMING POOL ~ CHILDREN’S PLAYGROUND ~ 
    JOM CAFE ~ ARCHERY ~ MAZE ~ CAMPSITE ~ HOMESTAY
</section>

</body>
</html>
